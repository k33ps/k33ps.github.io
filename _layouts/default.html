<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: "en" }}">

  {%- include head.html -%}

  <body>

    {%- include header.html -%}

    <main class="page-content" aria-label="Content">
      <div class="wrapper">
        {{ content }}
      </div>
    </main>

    {%- comment -%} 수미상관: long post pages repeat the header above the footer {%- endcomment -%}
    {%- if page.layout == "post" -%}
    <div class="site-header-bottom">
      {%- include header.html -%}
    </div>
    {%- endif -%}

    {%- include footer.html -%}

  </body>

</html>
