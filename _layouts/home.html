---
layout: default
---
<div class="home-hero">
  <h1 class="home-about-title">About</h1>

  <p class="hero-intro">
    만들고, 탐험하고, 기록하는 엔지니어입니다.<br>
    가족과의 일상, 일과 배움, 취미와 장비 이야기를 씁니다.
  </p>

  <div class="home-recent">
    <h2 class="home-recent-title">Recent</h2>
    <ul class="post-lines">
      {%- for post in site.posts limit: 3 -%}
      <li>
        <span class="post-meta">{{ post.date | date: "%Y-%m-%d" }}</span>
        <a href="{{ post.url | relative_url }}">{{ post.title | escape }}</a>
      </li>
      {%- endfor -%}
    </ul>

    <p class="hero-links">
      <a href="{{ '/archive/' | relative_url }}">All posts &rarr;</a>
    </p>
  </div>
</div>
